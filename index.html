<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ホワイトノイズジェネレーター</title>
</head>
<body>
  <h1>ホワイトノイズ再生</h1>
  <button onclick="startNoise()">再生</button>
  <button onclick="stopNoise()">停止</button>

  <script>
    // AudioContext を生成（ブラウザ互換対応）
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let noiseSource;

    // ホワイトノイズを生成する関数
    function createWhiteNoise() {
      const bufferSize = audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1; // -1～+1 のランダム値
      }
      return buffer;
    }

    // ホワイトノイズを再生する関数
    function startNoise() {
      // 既に再生中の場合は停止
      if (noiseSource) {
        noiseSource.stop();
      }
      const buffer = createWhiteNoise();
      noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = buffer;
      noiseSource.loop = true;
      noiseSource.connect(audioCtx.destination);
      noiseSource.start();
    }

    // 再生中のホワイトノイズを停止する関数
    function stopNoise() {
      if (noiseSource) {
        noiseSource.stop();
        noiseSource = null;
      }
    }
  </script>
</body>
</html>
