<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柔らかいホワイトノイズジェネレーター</title>
</head>
<body>
  <h1>柔らかいホワイトノイズ再生</h1>
  <button onclick="startNoise()">再生</button>
  <button onclick="stopNoise()">停止</button>
  <br><br>
  <label for="cutoff">低域カットオフ周波数 (Hz):</label>
  <input type="range" id="cutoff" min="500" max="5000" value="2000" step="100" onchange="updateFilter(this.value)">
  <span id="cutoffValue">2000</span> Hz

  <script>
    let audioCtx;
    let noiseSource;
    let filter;

    function createWhiteNoise() {
      const bufferSize = 2 * (audioCtx?.sampleRate || 44100); // 2秒分のバッファ
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1; // -1 ～ +1 のランダム値
      }
      return buffer;
    }

    function startNoise() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (noiseSource) {
        noiseSource.stop();
      }

      noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = createWhiteNoise();
      noiseSource.loop = true;

      filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = document.getElementById("cutoff").value;

      noiseSource.connect(filter);
      filter.connect(audioCtx.destination);

      noiseSource.start();
    }

    function stopNoise() {
      if (noiseSource) {
        noiseSource.stop();
        noiseSource = null;
      }
    }

    function updateFilter(value) {
      document.getElementById("cutoffValue").innerText = value;
      if (filter) {
        filter.frequency.value = value;
      }
    }
  </script>
</body>
</html>
